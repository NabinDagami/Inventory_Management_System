<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1E40AF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E3A8A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chartGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="128" cy="128" r="120" fill="url(#boxGradient)" filter="url(#shadow)"/>
  
  <!-- Main Storage Box -->
  <rect x="65" y="75" width="60" height="45" rx="4" fill="#FFFFFF" opacity="0.9"/>
  <rect x="67" y="77" width="56" height="41" rx="2" fill="none" stroke="#1E40AF" stroke-width="2"/>
  
  <!-- Stack of boxes (inventory) -->
  <rect x="80" y="65" width="45" height="35" rx="3" fill="#FFFFFF" opacity="0.8"/>
  <rect x="82" y="67" width="41" height="31" rx="2" fill="none" stroke="#1E40AF" stroke-width="1.5"/>
  
  <rect x="95" y="55" width="35" height="28" rx="3" fill="#FFFFFF" opacity="0.7"/>
  <rect x="97" y="57" width="31" height="24" rx="2" fill="none" stroke="#1E40AF" stroke-width="1.5"/>
  
  <!-- Chart/Graph element -->
  <g transform="translate(140,90)">
    <!-- Chart background -->
    <rect x="0" y="0" width="80" height="60" rx="6" fill="#FFFFFF" opacity="0.9" filter="url(#shadow)"/>
    
    <!-- Chart bars -->
    <rect x="10" y="35" width="8" height="15" fill="url(#chartGradient)"/>
    <rect x="22" y="28" width="8" height="22" fill="url(#chartGradient)"/>
    <rect x="34" y="20" width="8" height="30" fill="url(#chartGradient)"/>
    <rect x="46" y="25" width="8" height="25" fill="url(#chartGradient)"/>
    <rect x="58" y="15" width="8" height="35" fill="url(#chartGradient)"/>
    
    <!-- Chart grid lines -->
    <line x1="8" y1="50" x2="70" y2="50" stroke="#E5E7EB" stroke-width="1"/>
    <line x1="8" y1="40" x2="70" y2="40" stroke="#E5E7EB" stroke-width="0.5"/>
    <line x1="8" y1="30" x2="70" y2="30" stroke="#E5E7EB" stroke-width="0.5"/>
    <line x1="8" y1="20" x2="70" y2="20" stroke="#E5E7EB" stroke-width="0.5"/>
    
    <!-- Growth arrow -->
    <path d="M 60 20 L 68 12 L 76 20 L 72 20 L 72 28 L 64 28 L 64 20 Z" fill="#EF4444"/>
  </g>
  
  <!-- Dollar sign for sales -->
  <circle cx="90" cy="180" r="25" fill="#10B981" opacity="0.9"/>
  <text x="90" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">$</text>
  
  <!-- Package icon for inventory -->
  <circle cx="170" cy="180" r="25" fill="#F59E0B" opacity="0.9"/>
  <rect x="158" y="168" width="24" height="18" rx="2" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  <line x1="158" y1="177" x2="182" y2="177" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="167" y1="168" x2="167" y2="186" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Company name styling -->
  <text x="128" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#1E40AF">
    INVENTORY PRO
  </text>
</svg>
